<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" role="img" aria-label="Patrick Waithaka - Carrier Payments and Real-Time Media Infrastructure">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#101a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f81f7"/>
      <stop offset="0.5" stop-color="#39d2c0"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#233046"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="round">
      <rect x="1" y="1" width="878" height="198" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect x="1" y="1" width="878" height="198" fill="url(#bg)"/>
    <rect x="1" y="1" width="878" height="198" fill="url(#grid)"/>
    <!-- top accent hairline -->
    <rect x="1" y="1" width="878" height="3" fill="url(#accent)"/>

    <!-- millisecond tick ruler, top right -->
    <g stroke="#2c3a52" stroke-width="2">
      <line x1="616" y1="36" x2="616" y2="54"/>
      <line x1="640" y1="42" x2="640" y2="54"/>
      <line x1="664" y1="42" x2="664" y2="54"/>
      <line x1="688" y1="42" x2="688" y2="54"/>
      <line x1="712" y1="36" x2="712" y2="54"/>
      <line x1="736" y1="42" x2="736" y2="54"/>
      <line x1="760" y1="42" x2="760" y2="54"/>
      <line x1="784" y1="42" x2="784" y2="54"/>
      <line x1="808" y1="36" x2="808" y2="54"/>
      <line x1="832" y1="42" x2="832" y2="54"/>
    </g>
    <text x="832" y="78" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#94a3b8">ms</text>

    <!-- name -->
    <text x="54" y="98" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="0.5" fill="#f0f6fc">Patrick Waithaka</text>

    <!-- title -->
    <text x="56" y="134" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" letter-spacing="3" fill="#39d2c0">CARRIER PAYMENTS &amp; REAL-TIME MEDIA INFRASTRUCTURE</text>

    <!-- steady pulse line: quiet is the deliverable -->
    <polyline points="56,172 560,172 572,172 580,154 588,183 596,172 832,172"
              fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>
  </g>

  <rect x="1" y="1" width="878" height="198" rx="16" fill="none" stroke="#30363d" stroke-width="1.5"/>
</svg>
